server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests if needed (optional since we use CORS, but good practice)
    # location /api/ {
    #     proxy_pass http://backend:9000;
    # }
}
